name: CI Audit Code IA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: audit-code-ia-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint Python
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run Ruff
        run: |
          ruff check scripts corpus/manuel/python

  test:
    name: Test scripts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Show Python version
        run: python --version

      - name: Validate Python syntax
        run: |
          python -m compileall scripts corpus/manuel/python

      - name: Run all evaluations
        run: |
          python3 scripts/lancer_tous.py

      - name: Generate report
        run: |
          python3 scripts/generer_rapport.py

      - name: Check expected outputs
        run: |
          test -f rapports/synthese_sonarqube.csv
          test -f rapports/synthese_snyk.csv
          test -f rapports/synthese_codeql.csv
          test -f rapports/synthese.csv
          test -f rapports/rapport.md

  evaluate:
    name: Evaluate ${{ matrix.tool }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        tool: [sonarqube, snyk, codeql]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Run evaluation for one tool
        run: |
          python3 scripts/evaluer.py \
            verite_terrain.csv \
            outils/${{ matrix.tool }}.csv \
            rapports/synthese_${{ matrix.tool }}.csv

      - name: Upload per-tool artifact
        uses: actions/upload-artifact@v6
        with:
          name: synthese-${{ matrix.tool }}
          path: rapports/synthese_${{ matrix.tool }}.csv

  report:
    name: Final report
    runs-on: ubuntu-latest
    needs: [lint, test, evaluate]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Download all evaluation artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: synthese-*
          path: rapports
          merge-multiple: true

      - name: Show downloaded files
        run: |
          echo "=== rapports/ ==="
          ls -R rapports

      - name: Generate consolidated report
        run: |
          python3 scripts/generer_rapport.py

      - name: Upload final reports
        uses: actions/upload-artifact@v6
        with:
          name: rapports-audit-code-ia
          path: |
            rapports/synthese.csv
            rapports/rapport.md
            rapports/synthese_sonarqube.csv
            rapports/synthese_snyk.csv
            rapports/synthese_codeql.csv